# Coolify default compose filename (docker-compose.yaml)

services:
  clawdashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://clawdashboard:clawdashboard@postgres:5432/clawdashboard}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_WEBHOOK_SECRET: ${OPENCLAW_WEBHOOK_SECRET}
      APP_URL: ${APP_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - workspaces:/data/workspaces:ro
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://clawdashboard:clawdashboard@postgres:5432/clawdashboard}
      OPENCLAW_GATEWAY_URL: ${OPENCLAW_GATEWAY_URL:-http://openclaw-gateway:18789}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_USE_CLI_BRIDGE: "true"
      WORKER_ENABLED: "true"
      OPENCLAW_GATEWAY_CONTAINER: openclaw-gateway
    depends_on:
      postgres:
        condition: service_healthy
      openclaw-gateway:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-clawdashboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-clawdashboard}
      POSTGRES_DB: ${POSTGRES_DB:-clawdashboard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdashboard -d clawdashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    environment:
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_HOOKS_TOKEN: ${OPENCLAW_HOOKS_TOKEN}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - workspaces:/home/node/openclaw/workspace
      - ./openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro
    expose:
      - "18789"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  pgdata:
  openclaw_config:
  workspaces:
